{% extends 'core/base.html' %}

{% block title %}Inloggen{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-form">
        <h2>Inloggen</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Gebruikersnaam:</label>
                <input type="text" name="username" id="id_username" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="id_password">Wachtwoord:</label>
                <input type="password" name="password" id="id_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Inloggen</button>
        </form>
        <p class="auth-links">
            Nog geen account? <a href="{% url 'register' %}">Registreer hier</a>
        </p>
        {% if form.errors %}
            <div class="error-messages">
                <p>Ongeldige gebruikersnaam of wachtwoord.</p>
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
