{% load static %}
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'core/styles.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="{% url 'dashboard' %}" class="logo">
                <img src="{% static 'core/aic4nl-logo.png' %}" alt="Logo">
            </a>

            <div class="nav-links">
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'community' %}">Community</a>
                <a href="{% url 'zoeken' %}">Zoeken</a>
            </div>
        </div>

        <div class="nav-right">
            {% if user.is_authenticated %}
                <button class="new-post-btn" onclick="openPostModal()">Nieuwe post</button>
                <a href="{% url 'profiel' %}" class="profile-icon" aria-label="Profiel">
                    <svg viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="8" r="4" fill="white"/>
                        <path d="M4 20c0-4 4-6 8-6s8 2 8 6" fill="white"/>
                    </svg>
                </a>
                <form method="post" action="{% url 'logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn" style="background: none; border: none; color: inherit; cursor: pointer;">Uitloggen</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="login-btn">Inloggen</a>
                <a href="{% url 'register' %}" class="register-btn">Registreren</a>
            {% endif %}
        </div>
    </nav>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <div class="modal-overlay" id="postModal">
        <div class="post-modal">
            <button class="modal-close" onclick="closePostModal()">×</button>
            {% include 'core/create_post_form.html' %}
        </div>
    </div>

    <div class="modal-overlay" id="postDetailModal">
        <div class="post-modal" style="max-width: 800px;">
            <button class="modal-close" onclick="closePostDetail()">×</button>
            <div id="postDetailContent"></div>
        </div>
    </div>

    <script>
        function openPostModal() {
            document.getElementById('postModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closePostModal() {
            document.getElementById('postModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function openPostDetail(id, title, username, userFunction, date, type, shortDesc, longDesc, categories) {
            const categoriesList = categories.split(',').map(cat => `<span class="community-tag">${cat.trim()}</span>`).join('');
            
            const html = `
                <div style="padding: 24px;">
                    <div style="display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px;">
                        <div class="post-user-avatar" style="width: 48px; height: 48px;">
                            ${username.charAt(0).toUpperCase()}
                        </div>
                        <div style="flex: 1;">
                            <h2 style="margin: 0 0 8px 0; font-size: 24px; color: #111827;">${title}</h2>
                            <div style="display: flex; align-items: center; gap: 6px; color: #6b7280; font-size: 14px;">
                                <span style="font-weight: 600; color: #111827;">${username}</span>
                                ${userFunction ? `<span>• ${userFunction}</span>` : ''}
                                <span>• ${date}</span>
                            </div>
                        </div>
                    </div>

                    <div style="display: inline-block; margin-bottom: 14px;">
                        <span class="community-tag" style="background: #dbeafe; color: #0284c7;">${type}</span>
                    </div>

                    <h3 style="color: #4b5563; font-weight: 600; margin: 16px 0 8px 0; font-size: 14px;">Korte beschrijving</h3>
                    <p style="color: #4b5563; font-size: 15px; line-height: 1.6; margin-bottom: 16px;">${shortDesc}</p>

                    ${longDesc ? `
                        <h3 style="color: #4b5563; font-weight: 600; margin: 16px 0 8px 0; font-size: 14px;">Uitgebreide beschrijving</h3>
                        <p style="color: #4b5563; font-size: 15px; line-height: 1.6; margin-bottom: 16px;">${longDesc}</p>
                    ` : ''}

                    ${categories ? `
                        <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #e5e7eb;">
                            <h3 style="color: #4b5563; font-weight: 600; margin: 0 0 8px 0; font-size: 14px;">Categorieën</h3>
                            <div style="display: flex; flex-wrap: wrap; gap: 6px;">
                                ${categoriesList}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
            
            document.getElementById('postDetailContent').innerHTML = html;
            document.getElementById('postDetailModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closePostDetail() {
            document.getElementById('postDetailModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.addEventListener('click', function(event) {
            const postModal = document.getElementById('postModal');
            const postDetailModal = document.getElementById('postDetailModal');
            if (event.target === postModal) {
                closePostModal();
            }
            if (event.target === postDetailModal) {
                closePostDetail();
            }
        });
    </script>
</body>
</html>
