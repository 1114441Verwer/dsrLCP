{% load static %}
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'core/styles.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="{% url 'dashboard' %}" class="logo">
                <img src="{% static 'core/aic4nl-logo.png' %}" alt="Logo">
            </a>

            <div class="nav-links">
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'community' %}">Community</a>
                <a href="{% url 'zoeken' %}">Zoeken</a>
            </div>
        </div>

        <div class="nav-right">
            {% if user.is_authenticated %}
                <button class="new-post-btn" onclick="openPostModal()">Nieuwe post</button>
                <a href="{% url 'profiel' %}" class="profile-icon" aria-label="Profiel">
                    <svg viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="8" r="4" fill="white"/>
                        <path d="M4 20c0-4 4-6 8-6s8 2 8 6" fill="white"/>
                    </svg>
                </a>
                <form method="post" action="{% url 'logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn" style="background: none; border: none; color: inherit; cursor: pointer;">Uitloggen</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="login-btn">Inloggen</a>
                <a href="{% url 'register' %}" class="register-btn">Registreren</a>
            {% endif %}
        </div>
    </nav>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <div class="modal-overlay" id="postModal">
        <div class="post-modal">
            <button class="modal-close" onclick="closePostModal()">×</button>
            {% include 'core/create_post_form.html' %}
        </div>
    </div>

    <script>
        function openPostModal() {
            document.getElementById('postModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closePostModal() {
            document.getElementById('postModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.addEventListener('click', function(event) {
            const modal = document.getElementById('postModal');
            if (event.target === modal) {
                closePostModal();
            }
        });
    </script>
</body>
</html>
